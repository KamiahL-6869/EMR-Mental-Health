<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EMR — Mental Health Communications!</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header>
    <div id="patientHeader">PatientID: Thindri1458 <strong id="patientName"> </strong> • MRN: Dr. Clover <span id="mrn"> </span> • Encounter: 12345 <span id="enc"></span></div>
  </header>

  <div class="container" role="main">
    <div class="main" id="thread" aria-live="polite" aria-label="Message thread">
      <!-- messages appended here -->
    </div>

    <aside class="sidebar">
      <div><strong>Care team</strong></div>
      <ul id="careTeam"></ul>
      <hr />
      <div><strong>Quick actions</strong></div>
      <button id="escalateBtn">Escalate to on-call</button>
    </aside>
  </div>

  <div style="padding:12px">
    <div class="composer" aria-label="Message composer">
      <select id="urgency" aria-label="Urgency">
        <option value="normal">Normal</option>
        <option value="urgent">Urgent</option>
        <option value="emergency">Emergency</option>
      </select>
      <textarea id="messageInput" placeholder="Write your secure message here..."></textarea>
      <button id="sendBtn">Send</button>
    </div>
    <div class="meta">All messages are secure and audited.</div>
  </div>

  <!-- client will fetch initial data from the server at /api/initialdata -->
  <script type="module" src="/js/thread.js"></script>
</body>
</html>
