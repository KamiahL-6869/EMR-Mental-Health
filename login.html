<!--This is the login frontend file (login window)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EMR Mental Health – Secure Login</title>

    <style>
        :root {
            --primary: #1A3D6B;        /* Hospital blue */
            --primary-light: #2F5C9A;
            --accent: #4BA3E3;         /* Calm medical blue */
            --background: #F4F7FA;     /* Clean clinical gray */
            --card-bg: #FFFFFF;
            --border: #D3D9E3;
            --text-dark: #1F2A36;
            --text-light: #6B7A8C;
            --radius: 10px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Inter, sans-serif;
            background: var(--background);
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        /* Top hospital header bar */
        .header-bar {
            width: 100%;
            max-width: 1100px;
            background: var(--primary);
            padding: 18px 26px;
            border-radius: var(--radius);
            color: white;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
        }

        .header-logo {
            width: 54px;
            height: 54px;
            border-radius: 8px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: white;
        }

        .header-title {
            font-size: 22px;
            font-weight: 600;
        }

        /* Login card */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            margin: 40px auto;
            padding: 32px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .login-card h2 {
            margin: 0 0 14px;
            color: var(--text-dark);
            font-size: 22px;
            font-weight: 600;
        }

        .login-card p {
            margin: 0 0 20px;
            color: var(--text-light);
            font-size: 14px;
        }

        label {
            font-size: 14px;
            color: var(--text-dark);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 6px 0 18px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s ease;
        }

        button:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-light);
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="header-bar">
        <div class="header-logo">EMR</div>
        <div class="header-title">EMR Mental Health – Secure Access Portal</div>
    </div>

    <div class="login-card">
        <h2>Staff Login</h2>
        <p>Authorized personnel only. All access is monitored and logged.</p>

        <form action="login.php" method="POST">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Log In</button>
        </form>
    </div>

    <div class="footer">
        © 2025 EMR Mental Health System • HIPAA Compliant Access
    </div>

</body>
</html>
