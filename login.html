<!--This is the login frontend file (login window)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>EMR Mental Health</title>

    <style>
        :root {
            --space-indigo: #2E294E;
            --pastel-petal: #EFBCD5;
            --lilac: #BE97C6;
            --lavender: #8661C1;
            --charcoal: #4B5267;
            --bg: var(--charcoal);
            --card-bg: rgba(190,151,198,0.12);
            --max-width: 980px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, 'Comic Sans MS', sans-serif;
            background: linear-gradient(180deg, var(--bg), #3f4456);
            color: var(--lavender);
            padding: 28px;
            display: flex;
            justify-content: center;
        }

        .page {
            width: 100%;
            max-width: var(--max-width);
            border: 10px solid var(--space-indigo);
            border-radius: 10px;
            background: linear-gradient(180deg, rgba(46,41,78,0.98), rgba(75,82,103,0.95));
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 20px;
        }

        .logo {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--lilac), var(--pastel-petal));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--space-indigo);
            font-size: 20px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--pastel-petal);
        }

        .loginpage h2 {
            color: var(--lavender);
            margin: 0 0 10px;
        }

        .login input, .login button {
            width: 100%;
            padding: 10px;
            margin: 6px 0 14px;
            border-radius: 8px;
            border: 1px solid rgba(239,188,213,0.18);
            font-size: 15px;
        }

        .login button {
            background: var(--pastel-petal);
            color: var(--space-indigo);
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s ease;
        }

        .login button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(46,41,78,0.18);
        }

        footer {
            margin-top: 22px;
            color: #D6C7E8;
            text-align: center;
            font-size: 13px;
        }

        @media (max-width:560px) {
            h1 { font-size: 20px; }
        }
    </style>
</head>

<body>
    <div class="page">
        <header>
            <div class="logo">EMR</div>
            <div>
                <h1>EMR Mental Health</h1>
            </div>
        </header>

        <section class="loginpage">
            <div class="login">
                <h2>Login using your credentials</h2>

                <!-- Login Form -->
                <form action="login.php" method="POST">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>

                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>

                    <button type="submit">Log In</button>
                </form>
            </div>
        </section>
    </div>
</body>
</html>
